<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pexeso Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Splash Screen -->
        <section id="splash-screen" class="screen active">
            <div class="content">
                <h1 class="logo">Pexeso</h1>
                <div class="loader">
                    <div class="loader-bar"></div>
                </div>
            </div>
        </section>

        <!-- Main Menu -->
        <section id="main-menu" class="screen">
            <div class="content">
                <h1 class="title">Pexeso</h1>
                <button id="play-button" class="btn-primary">HRAŤ</button>
                <div class="menu-footer">
                    <button class="btn-icon">⚙️</button>
                    <button class="btn-icon">🏆</button>
                </div>
            </div>
        </section>

        <!-- Game Board -->
        <section id="game-board" class="screen">
            <header class="game-header">
                <div class="stats">
                    <div class="stat-item">Čas: <span id="timer">00:00</span></div>
                    <div class="stat-item">Tahy: <span id="moves">0</span></div>
                </div>
                <button id="pause-button" class="btn-pause">⏸</button>
            </header>
            <div id="grid" class="grid-4x4">
                <!-- Cards will be generated by JS -->
            </div>
        </section>

        <!-- Victory Screen -->
        <section id="section">
            <section id="victory-screen" class="screen">
                <div class="victory-panel">
                    <div class="trophy">🏆</div>
                    <h2>Skvělá práce!</h2>
                    <div class="final-stats">
                        <p>Čas: <span id="final-time">00:00</span></p>
                        <p>Počet tahů: <span id="final-moves">0</span></p>
                    </div>
                    <button id="restart-button" class="btn-primary">HRÁT ZNOVU</button>
                    <button id="home-button" class="btn-secondary">DOMŮ</button>
                </div>
            </section>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
